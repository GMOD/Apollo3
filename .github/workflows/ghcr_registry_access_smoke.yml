name: USDA GHCR registry smoke test

on:
  workflow_dispatch:
    inputs:
      image_tag_prefix:
        description: 'Prefix for the test image tag'
        required: true
        default: 'registry-access-test'
        type: string

permissions:
  contents: read
  packages: write

env:
  SMOKE_IMAGE: ghcr.io/usda-ree-ars/ghcr-access-smoke

jobs:
  push-smoke-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag_prefix }}-${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create tiny smoke Dockerfile
        run: |
          cat > Dockerfile.ghcr-smoke <<'EOF'
          FROM public.ecr.aws/docker/library/alpine:3.20
          RUN echo "usda ghcr smoke test" > /smoke.txt
          CMD ["cat", "/smoke.txt"]
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ghcr-smoke
          platforms: linux/amd64
          push: true
          tags: ${{ env.SMOKE_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect "${{ env.SMOKE_IMAGE }}:${{ steps.tag.outputs.tag }}"

      - name: Write run summary
        run: |
          {
            echo "## USDA GHCR smoke test"
            echo
            echo "Pushed image:"
            echo
            echo "- \`${{ env.SMOKE_IMAGE }}:${{ steps.tag.outputs.tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
